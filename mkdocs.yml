site_name: VitalTech - Requisitos de Software
site_description: 'Repositório de projeto da disciplina de REQ-T1, 2026.1'
site_author: 'Equipe VitalTech'

theme:
  name: material
  language: pt-BR
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para tema escuro
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para tema claro

nav:
  - Início: index.md
  - Visão do Produto e Projeto:
      - 1. Cenário Atual e Negócio: visao/cenario_atual.md
      - 2. Solução Proposta: visao/solucao_proposta.md
      - 3. Estratégias de Eng. de Software: visao/estrategias_eng_soft.md
      - 4. Engenharia de Requisitos: visao/eng_requisitos.md
      - 5. Cronograma e Entregas: visao/cronograma.md
      - 6. Interação Equipe e Cliente: visao/interacao.md
  - Atas e Gravações das Sprints:
      - Sprint 1: sprints/sprint1.md
      - Sprint 2: sprints/sprint2.md
      - Sprint 3: sprints/sprint3.md
      - Sprint 4: sprints/sprint4.md
      - Sprint 5: sprints/sprint5.md
      - Sprint 6: sprints/sprint6.md
  - Histórico de Versões: historico.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
