site_name: VitalTech
site_description: 'Repositório de projeto da disciplina de REQ-T1, 2026.1'
site_author: 'Equipe VitalTech'

theme: 
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  language: pt-BR
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para tema escuro
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: black
      toggle:
        icon: material/brightness-4
        name: Mudar para tema claro

extra_css:
  - stylesheets/custom.css

nav:
  - Início: index.md
  - Visão do Produto e Projeto:
      - 1. Cenário Atual e Negócio: visao/cenario_atual.md
      - 2. Solução Proposta: visao/solucao_proposta.md
      - 3. Estratégias de Eng. de Software: visao/estrategias_eng_soft.md
      - 4. Engenharia de Requisitos: visao/eng_requisitos.md
      - 5. Cronograma e Entregas: visao/cronograma.md
      - 6. Interação Equipe e Cliente: visao/interacao.md
      - 7. Lições Aprendidas: visao/licoes_aprendidas.md
  - Atas e Gravações das Sprints:
      - Sprint 0:
          - Reunião 1 (Elicitação): sprints/sprint0/reuniao1.md
          - Reunião 2 (Alinhamento): sprints/sprint0/reuniao2.md
          - Reunião 3 (Monitoria): sprints/sprint0/reuniao3.md
      - Sprint 1:
          - Planning: sprints/sprint1/planning.md
          - Review: sprints/sprint1/review.md
          - Retrospectiva: sprints/sprint1/retrospectiva.md
          - Dailys: sprints/sprint1/dailys.md
      - Sprint 2:
          - Planning: sprints/sprint2/planning.md
          - Review: sprints/sprint2/review.md
          - Retrospectiva: sprints/sprint2/retrospectiva.md
          - Dailys: sprints/sprint2/dailys.md
      - Sprint 3:
          - Planning: sprints/sprint3/planning.md
          - Review: sprints/sprint3/review.md
          - Retrospectiva: sprints/sprint3/retrospectiva.md
          - Dailys: sprints/sprint3/dailys.md
      - Sprint 4:
          - Planning: sprints/sprint4/planning.md
          - Review: sprints/sprint4/review.md
          - Retrospectiva: sprints/sprint4/retrospectiva.md
          - Dailys: sprints/sprint4/dailys.md
      - Sprint 5:
          - Planning: sprints/sprint5/planning.md
          - Review: sprints/sprint5/review.md
          - Retrospectiva: sprints/sprint5/retrospectiva.md
          - Dailys: sprints/sprint5/dailys.md
      - Sprint 6:
          - Planning: sprints/sprint6/planning.md
          - Review: sprints/sprint6/review.md
          - Retrospectiva: sprints/sprint6/retrospectiva.md
          - Dailys: sprints/sprint6/dailys.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
